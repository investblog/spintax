name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Verify all version references match tag
        run: |
          TAG_VERSION=${{ steps.version.outputs.VERSION }}
          ERRORS=0

          # 1. Plugin header Version:
          HEADER_VERSION=$(grep "Version:" plugin/spintax.php | sed "s/.*Version:[[:space:]]*//")
          if [ "$HEADER_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Plugin header Version ($HEADER_VERSION) does not match tag ($TAG_VERSION)"
            ERRORS=$((ERRORS + 1))
          fi

          # 2. SPINTAX_VERSION constant
          CONST_VERSION=$(grep "SPINTAX_VERSION" plugin/spintax.php | sed "s/.*'\(.*\)'.*/\1/")
          if [ "$CONST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::SPINTAX_VERSION constant ($CONST_VERSION) does not match tag ($TAG_VERSION)"
            ERRORS=$((ERRORS + 1))
          fi

          # 3. readme.txt Stable tag
          README_VERSION=$(grep "Stable tag:" plugin/readme.txt | sed "s/.*Stable tag:[[:space:]]*//")
          if [ "$README_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::readme.txt Stable tag ($README_VERSION) does not match tag ($TAG_VERSION)"
            ERRORS=$((ERRORS + 1))
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "::error::Version mismatch detected. Run: npm run version:set -- X.Y.Z"
            exit 1
          fi
          echo "✓ All version references match: $TAG_VERSION"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPCS
        run: composer run phpcs

      - name: Build plugin ZIP
        run: |
          mkdir -p build/spintax
          cp -r plugin/* build/spintax/
          cd build
          rm -f spintax/composer.json spintax/composer.lock spintax/phpcs.xml.dist
          rm -rf spintax/vendor spintax/.phpunit.result.cache
          zip -r ../spintax.zip spintax -x '*.DS_Store' -x '*.git*'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: spintax.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
