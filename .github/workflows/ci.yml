name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP ${{ matrix.php }} Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPCS
        run: composer run phpcs

  test:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }} Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.0', '8.2']
        wp: ['6.2', 'latest']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysqli

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Install WordPress test suite
        run: |
          sudo apt-get update -qq && sudo apt-get install -yqq subversion
          bash <(curl -s https://raw.githubusercontent.com/wp-cli/scaffold-command/main/templates/install-wp-tests.sh) wordpress_tests root root 127.0.0.1 ${{ matrix.wp }} true

      - name: Run PHPUnit
        run: composer run test

  build:
    name: Build ZIP
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          mkdir -p build/spintax
          cp -r plugin/* build/spintax/
          cd build
          rm -f spintax/composer.json spintax/composer.lock spintax/phpcs.xml.dist spintax/phpunit.xml.dist
          rm -rf spintax/vendor spintax/.phpunit.result.cache spintax/tests
          zip -r ../spintax.zip spintax -x '*.DS_Store' -x '*.git*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spintax
          path: spintax.zip
          retention-days: 7
