name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP ${{ matrix.php }} Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPCS
        run: composer run phpcs

  test:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }} Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.0', '8.2']
        wp: ['6.2', 'latest']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysqli

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Install WordPress test suite
        env:
          WP_VERSION: ${{ matrix.wp }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -yqq subversion

          # Resolve version aliases to actual version numbers
          if [ "$WP_VERSION" = "latest" ]; then
            WP_VERSION=$(curl -fsSL https://api.wordpress.org/core/version-check/1.7/ | jq -r '.offers[0].version')
            echo "Resolved latest WP to $WP_VERSION"
          fi

          # Ensure 3-part version (6.2 → 6.2.0) for SVN tag lookups
          if [[ "$WP_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            WP_VERSION="${WP_VERSION}.0"
            echo "Expanded to $WP_VERSION"
          fi

          WP_TESTS_DIR=/tmp/wordpress-tests-lib
          WP_CORE_DIR=/tmp/wordpress

          # Download WP test suite via SVN
          mkdir -p "$WP_TESTS_DIR"
          svn export --quiet --force "https://develop.svn.wordpress.org/tags/${WP_VERSION}/tests/phpunit/includes/" "$WP_TESTS_DIR/includes"
          svn export --quiet --force "https://develop.svn.wordpress.org/tags/${WP_VERSION}/tests/phpunit/data/" "$WP_TESTS_DIR/data"

          # Download WP core
          curl -fsSL "https://wordpress.org/wordpress-${WP_VERSION}.tar.gz" | tar xz -C /tmp/

          # Create wp-tests-config.php
          curl -fsSL "https://develop.svn.wordpress.org/tags/${WP_VERSION}/wp-tests-config-sample.php" -o "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s|dirname( __FILE__ ) . '/src/'|'${WP_CORE_DIR}/'|" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s/youremptytestdbnamehere/wordpress_tests/" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s/yourusernamehere/root/" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s/yourpasswordhere/root/" "$WP_TESTS_DIR/wp-tests-config.php"
          sed -i "s|localhost|127.0.0.1|" "$WP_TESTS_DIR/wp-tests-config.php"

          # Verify installation
          ls "$WP_TESTS_DIR/includes/functions.php"

      - name: Run PHPUnit
        run: composer run test

  build:
    name: Build ZIP
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          mkdir -p build/spintax
          cp -r plugin/* build/spintax/
          cd build
          rm -f spintax/composer.json spintax/composer.lock spintax/phpcs.xml.dist spintax/phpunit.xml.dist
          rm -rf spintax/vendor spintax/.phpunit.result.cache spintax/tests
          zip -r ../spintax.zip spintax -x '*.DS_Store' -x '*.git*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spintax
          path: spintax.zip
          retention-days: 7
